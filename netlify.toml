# Netlify + Next.js
# Referencia: https://github.com/netlify-templates/next-platform-starter/blob/main/netlify.toml
#
# Si el repo conectado en Netlify es la carpeta padre (no esta carpeta), en el panel:
# Site settings → Build & deploy → Base directory → `erse-erse-electric`

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Desactiva Netlify Identity en el cliente: el formulario entra directo (sin pantalla de correo/contraseña).
  # Para volver a exigir login en producción, borra esta línea o ponla en "false".
  NEXT_PUBLIC_NETLIFY_IDENTITY_OFF = "true"
